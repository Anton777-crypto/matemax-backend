/* ---- MECHANIC 11: numline (SVG числова пряма) ---- */
function renderNumline(stage, g){
  const q = genNumlinePosition(g.grade);
  const ticks = [];
  const numTicks = 6;
  const tickStep = q.lineMax / numTicks;
  for(let i=0;i<=numTicks;i++){ ticks.push(Math.round(i*tickStep)); }
  const svgWidth = 600, padding = 40;
  const valueToX = (v)=> padding + (v / q.lineMax) * (svgWidth - padding*2);

  // generate options as positions on the line (values), pick 4 candidate values near actual
  const candidates = shuffle([q.value, ...wrongAnswersNear(q.value, 3, Math.max(1,Math.round(q.lineMax*0.15)))]);

  stage.innerHTML = `
    <div class="gp-card">
      <p class="gp-question">Де на числовій прямій стоїть число <b style="color:var(--primary);">${q.value}</b>?</p>
      <div class="numline-wrap">
        <svg viewBox="0 0 ${svgWidth} 110" style="width:100%;">
          <line x1="${padding}" y1="55" x2="${svgWidth-padding}" y2="55" stroke="#D6D6F0" stroke-width="4" stroke-linecap="round"/>
          ${ticks.map(t=>`
            <line x1="${valueToX(t)}" y1="45" x2="${valueToX(t)}" y2="65" stroke="#B8B8DA" stroke-width="3"/>
            <text x="${valueToX(t)}" y="88" text-anchor="middle" font-size="13" fill="#6E6E8F" font-weight="600">${t}</text>
          `).join('')}
          ${candidates.map((c,i)=>`
            <circle class="nl-point" data-val="${c}" cx="${valueToX(c)}" cy="55" r="14" fill="#5B4FD9" stroke="#fff" stroke-width="3" style="cursor:pointer;"/>
            <text x="${valueToX(c)}" y="60" text-anchor="middle" font-size="12" fill="#fff" font-weight="800" style="pointer-events:none;">${i+1}</text>
          `).join('')}
        </svg>
      </div>
      <p class="muted" style="text-align:center;">Натисни на точку, яка відповідає числу ${q.value}</p>
      <div class="gp-feedback" id="gpFeedback"></div>
    </div>
  `;
  $all('.nl-point', stage).forEach(pt=>{
    pt.addEventListener('click', ()=>{
      const val = parseInt(pt.dataset.val);
      const correct = val === q.value;
      $all('.nl-point', stage).forEach(p=>{
        p.style.pointerEvents='none';
        if(parseInt(p.dataset.val)===q.value) p.setAttribute('fill', '#22C98E');
        else if(p===pt) p.setAttribute('fill', '#E84855');
      });
      gpAwardPoint(correct);
      $('#gpFeedback').className = 'gp-feedback ' + (correct?'ok':'bad');
      $('#gpFeedback').textContent = correct ? '✅ Правильно!' : `❌ Правильна позиція: ${q.value}`;
      stage.querySelector('.gp-card').insertAdjacentHTML('beforeend', gpNextRoundBtn());
      bindNextBtn();
    });
  });
}

/* ---- MECHANIC 12: balloons (лопни правильну кулю) ---- */
const BALLOON_COLORS = ['#5B4FD9','#22C98E','#F5A623','#E84855','#3FA7D6','#C145D6'];
function renderBalloons(stage, g){
  let q;
  if(g.topic==='multtable') q = genMultTable(g.grade);
  else if(g.topic==='geometry'){ const s=genGeometryQuestion(g.grade); q={text:s.text, answer:s.answer}; }
  else q = topicQuestion(g.topic, g.grade);
  const answer = q.answer;
  const options = shuffle([answer, ...wrongAnswersNear(answer, 4, g.grade===1?5:g.grade===2?8:g.grade===3?20:50)]);
  let answered = false;

  stage.innerHTML = `
    <div class="gp-card">
      <p class="gp-question">${esc(q.text)}</p>
      <p class="muted" style="text-align:center;margin-bottom:10px;">Лопни кулю з правильною відповіддю!</p>
      <div class="balloon-field" id="balloonField"></div>
      <div class="gp-feedback" id="gpFeedback"></div>
    </div>
  `;
  const field = $('#balloonField');
  options.forEach((opt,i)=>{
    const b = el(`<div class="balloon" data-val="${opt}" style="left:${(i/(options.length))*88+2}%; background:${BALLOON_COLORS[i%BALLOON_COLORS.length]}; animation-duration:${5+i*0.6}s; animation-delay:${i*0.3}s;">${opt}</div>`);
    field.appendChild(b);
    b.addEventListener('click', ()=>{
      if(answered) return;
      answered = true;
      const correct = opt === answer;
      $all('.balloon', field).forEach(bal=>{ bal.style.animationPlayState='paused'; });
      b.style.transform = 'scale(1.3)'; b.style.opacity='0';
      gpAwardPoint(correct, 12);
      $('#gpFeedback').className = 'gp-feedback ' + (correct?'ok':'bad');
      $('#gpFeedback').textContent = correct ? '✅ Точно в ціль! +12' : `❌ Правильна відповідь: ${answer}`;
      stage.querySelector('.gp-card').insertAdjacentHTML('beforeend', gpNextRoundBtn());
      bindNextBtn();
    });
  });
}

/* ============================================================
   ІНІЦІАЛІЗАЦІЯ ЗАСТОСУНКУ
   ============================================================ */
async function init(){
  // Перевіряємо бекенд
  await checkBackend();

  // Перевіряємо URL параметри (verify email / reset password)
  const urlAction = checkUrlParams();

  if (API_MODE) {
    // ── РЕЖИМ З БЕКЕНДОМ ────────────────────────────────────
    if (urlAction?.type === 'verify') {
      // Підтвердження email через URL
      try {
        const user = await API.verifyEmail(urlAction.token);
        STATE.currentUser = user;
        toast('Email підтверджено! Ласкаво просимо! 🎉', 'success');
        // Підтягуємо дані з БД
        await syncUserDataFromBackend(user);
        renderApp();
      } catch (e) {
        toast(e.message || 'Посилання недійсне', 'error');
        renderAuthScreen();
      }
      return;
    }

    if (urlAction?.type === 'reset') {
      STATE.pendingResetToken = urlAction.token;
      renderResetPasswordScreen();
      return;
    }

    // Пробуємо відновити сесію з localStorage токену
    const savedToken = TokenStore.get();
    if (savedToken) {
      try {
        const user = await API.me();
        STATE.currentUser = user;
        await syncUserDataFromBackend(user);
        renderApp();
        return;
      } catch {
        TokenStore.clear();
      }
    }

    renderAuthScreen();
  } else {
    // ── DEMO РЕЖИМ (in-memory) ───────────────────────────────
    checkUrlForVerification();
    renderAuthScreen();
  }
}

// ── Синхронізація даних з бекенду в локальний DB ─────────────
async function syncUserDataFromBackend(user) {
  if (!API_MODE) return;
  try {
    // Підтягуємо уроки, ДЗ, повідомлення і зберігаємо в DB для рендерингу
    const [lessons, homework, materials, payments, notifications] = await Promise.allSettled([
      API.getLessons(),
      API.getHomework(),
      API.getMaterials(),
      API.getPayments(),
      API.getNotifications(),
    ]);

    if (lessons.status === 'fulfilled') DB.lessons = lessons.value.map(adaptLesson);
    if (homework.status === 'fulfilled') DB.homework = homework.value.map(adaptHomework);
    if (materials.status === 'fulfilled') DB.materials = adaptMaterials(materials.value);
    if (payments.status === 'fulfilled') DB.payments = payments.value;
    if (notifications.status === 'fulfilled') DB.notifications = notifications.value;

    // Підтягуємо всіх користувачів для адміна/вчителя
    if (user.role === 'admin') {
      const usersResp = await API.getUsers().catch(() => ({ users: [] }));
      DB.users = usersResp.users || [];
      // Додаємо поточного юзера якщо нема
      if (!DB.users.find(u => u.id === user.id)) DB.users.push(user);
    } else if (user.role === 'teacher') {
      const studentsResp = await API.getUsers('student').catch(() => ({ users: [] }));
      DB.users = [user, ...(studentsResp.users || [])];
    } else if (user.role === 'parent') {
      DB.users = [user];
      // Завантажуємо дітей з бекенду
      const childrenResp = await apiFetch('/users/my-children').catch(() => ({ children: [] }));
      const children = (childrenResp.children || []).map(ch => ({ ...ch, parentId: user.id }));
      DB.users.push(...children);
    } else {
      DB.users = [user];
      // Додаємо вчителя
      if (user.teacher) DB.users.push(user.teacher);
    }

    // Прогрес ігор
    if (user.role === 'student') {
      const gpResp = await API.getGameProgress().catch(() => ({ progress: {} }));
      DB.gameProgress[user.id] = gpResp.progress || {};
    }

  } catch (e) {
    console.warn('Sync error:', e.message);
  }
}

// ── Адаптери: бекенд-формат → фронтенд-формат ───────────────
function adaptLesson(l) {
  return {
    id: l.id, studentId: l.studentId, teacherId: l.teacherId,
    subject: l.subject, date: l.date, time: l.time,
    meetUrl: l.meetUrl, trial: l.trial, status: l.status, notes: l.notes,
  };
}
function adaptHomework(h) {
  return {
    id: h.id, studentId: h.studentId, teacherId: h.teacherId,
    title: h.title, desc: h.desc, due: h.due, done: h.done,
    grade: h.grade, fileUrl: h.fileUrl, fileName: h.fileName, audioBase64: h.audioBase64,
  };
}
function adaptMaterials(mats) {
  return mats.map(m => ({
    ...m,
    grade: typeof m.grades === 'string' ? JSON.parse(m.grades) : m.grades,
  }));
}

// ── Обгортки для операцій з даними (API + in-memory) ─────────
const DataLayer = {
  async addLesson(payload) {
    if (API_MODE) {
      const l = await API.createLesson(payload);
      DB.lessons.push(adaptLesson(l));
      return l;
    } else {
      const l = { id: uid(), ...payload, status: 'planned' };
      DB.lessons.push(l);
      return l;
    }
  },
  async completeLesson(id) {
    if (API_MODE) {
      await API.updateLesson(id, { status: 'completed' });
    }
    const l = DB.lessons.find(x => x.id === id);
    if (l) l.status = 'completed';
  },
  async addHomework(payload) {
    if (API_MODE) {
      const h = await API.createHomework(payload);
      DB.homework.push(adaptHomework(h));
      return h;
    } else {
      const h = { id: uid(), ...payload, done: false };
      DB.homework.push(h);
      return h;
    }
  },
  async toggleHomework(id, done) {
    if (API_MODE) await API.updateHomework(id, { done }).catch(() => {});
    const h = DB.homework.find(x => x.id === id);
    if (h) { h.done = done; if (done) h.doneAt = new Date().toISOString(); }
  },
  async gradeHomework(id, grade) {
    if (API_MODE) await API.updateHomework(id, { grade }).catch(() => {});
    const h = DB.homework.find(x => x.id === id);
    if (h) h.grade = grade;
  },
  async addMaterial(payload) {
    if (API_MODE) {
      const m = await API.createMaterial(payload);
      DB.materials.push({ ...m, grade: JSON.parse(m.grades || '[]') });
      return m;
    } else {
      const m = { id: uid(), ...payload, uploadedAt: new Date().toISOString().slice(0, 10) };
      DB.materials.push(m);
      return m;
    }
  },
  async createPayment(payload) {
    if (API_MODE) {
      const p = await API.createPayment(payload);
      DB.payments.push(p);
      return p;
    } else {
      const p = { id: uid(), ...payload, status: 'pending' };
      DB.payments.push(p);
      return p;
    }
  },
  async confirmPayment(id) {
    if (API_MODE) await API.updatePayment(id, 'confirmed').catch(() => {});
    const p = DB.payments.find(x => x.id === id);
    if (p) p.status = 'confirmed';
  },
  async sendMsg(fromId, toId, text) {
    if (API_MODE) {
      await API.sendMessage(toId, text).catch(() => {});
    }
    const m = { id: uid(), fromId, toId, text, date: new Date().toISOString(), read: false };
    DB.messages.push(m);
    return m;
  },
  async saveGameScore(gameId, score) {
    if (API_MODE) await API.saveGameProgress(gameId, score).catch(() => {});
  },
  async adminCreateUser(payload) {
    if (API_MODE) {
      const resp = await API.adminCreate(payload);
      if (resp.user) DB.users.push(resp.user);
      return resp;
    } else {
      // demo mode
      const id = uid();
      const user = { id, ...payload, emailVerified: true, balance: 0, trialUsed: false };
      DB.users.push(user);
      return { user, tempPassword: payload.password || '111111' };
    }
  },
  async deleteUser(id) {
    if (API_MODE) await API.deleteUser(id);
    DB.users = DB.users.filter(u => u.id !== id);
  },
};

// ── Екран скидання пароля ─────────────────────────────────────
function renderResetPasswordScreen() {
  const root = $('#appRoot');
  root.innerHTML = `
    <div class="auth-screen">
      <div class="auth-box">
        <div class="auth-logo"><div class="logo-mark">M</div><strong>МатеМакс</strong></div>
        <h3 style="text-align:center;margin-bottom:18px;">Новий пароль</h3>
        <div class="field"><label>Новий пароль</label><input type="password" id="newPassInput" placeholder="Мінімум 6 символів"></div>
        <div class="field"><label>Підтвердіть пароль</label><input type="password" id="newPassConfirm" placeholder="Повторіть пароль"></div>
        <button class="btn btn-primary btn-block" id="doResetBtn">Змінити пароль</button>
      </div>
    </div>
  `;
  $('#doResetBtn').onclick = async () => {
    const p1 = $('#newPassInput').value;
    const p2 = $('#newPassConfirm').value;
    if (p1.length < 6) { toast('Пароль — мінімум 6 символів', 'error'); return; }
    if (p1 !== p2) { toast('Паролі не збігаються', 'error'); return; }
    try {
      await API.resetPassword(STATE.pendingResetToken, p1);
      toast('Пароль змінено! Увійдіть з новим паролем.', 'success');
      STATE.pendingResetToken = null;
      STATE.authMode = 'login';
      renderAuthScreen();
    } catch (e) {
      toast(e.message || 'Помилка', 'error');
    }
  };
}
